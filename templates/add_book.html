{% extends "base.html" %}
{% block content %}

<div class="container mt-4">

    <h3 class="mb-4">➕ Add New Book</h3>

    <div class="card shadow border-0 p-4">

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">📚 Book Title</label>
                <input type="text" name="title" class="form-control" placeholder="Enter book title" required>
            </div>

            <div class="mb-3">
                <label class="form-label">✍ Author</label>
                <input type="text" name="author" class="form-control" placeholder="Enter author name" required>
            </div>

            <button type="submit" class="btn btn-success w-100">
                <i class="fa fa-plus"></i> Add Book
            </button>

        </form>

    </div>

    <div class="mt-3">
        <a href="{{ url_for('view_books') }}" class="btn btn-secondary">
            ⬅ Back
        </a>
    </div>

</div>

{% endblock %}
