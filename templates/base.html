<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LMS</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Font Awesome -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    >

    <!-- Custom CSS -->
    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >
</head>
<body class="{% if 'dashboard' in request.path %}dashboard-bg{% endif %}">

<div class="d-flex">

    <!-- 🔹 SIDEBAR -->
    <div class="sidebar bg-dark text-white p-3">

        <div class="text-center mb-4">
            <img src="{{ url_for('static', filename='logo.png') }}" height="120">
            <!--<h5 class="mt-2">LMS</h5>-->
        </div>

        <a href="{{ url_for('dashboard') }}" class="sidebar-link">
            <i class="fa fa-house"></i> Dashboard
        </a>

        <a href="{{ url_for('view_books') }}" class="sidebar-link">
            <i class="fa fa-book"></i> Books
        </a>

        <a href="{{ url_for('issued_books') }}" class="sidebar-link">
            <i class="fa fa-book-open"></i> Issued Books
        </a>

        {% if session.get('role') == 'admin' %}

        <a href="{{ url_for('add_book') }}" class="sidebar-link">
            <i class="fa fa-plus"></i> Add Book
        </a>

        <a href="{{ url_for('issue_book') }}" class="sidebar-link">
            <i class="fa fa-upload"></i> Issue Book
        </a>

        <a href="{{ url_for('return_book') }}" class="sidebar-link">
            <i class="fa fa-undo"></i> Return Book
        </a>

        <a href="{{ url_for('users') }}" class="sidebar-link">
            <i class="fa fa-users"></i> Users
        </a>

        <a href="{{ url_for('add_user') }}" class="sidebar-link">
            <i class="fa fa-user-plus"></i> Add Student
        </a>

        <a href="{{ url_for('student_issues') }}" class="sidebar-link">
            <i class="fa fa-circle-exclamation"></i> Student Issues
        </a>

        {% endif %}

        {% if session.get('role') == 'student' %}

        <a href="{{ url_for('student_dashboard') }}" class="sidebar-link">
            <i class="fa fa-user"></i> My Dashboard
        </a>

        {% endif %}

        <hr>

        <a href="{{ url_for('logout') }}" class="btn btn-danger w-100">
            Logout
        </a>

    </div>

    <!-- 🔹 MAIN CONTENT -->
    <div class="content p-4">

        {% block content %}{% endblock %}

    </div>

</div>

</body>
</html>
